spring.application.name=prm.project-base
server.port=5001

# DATABASE CONFIGURATION
# Active Database: MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/project_base_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# JPA & HIBERNATE CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# FILE UPLOAD CONFIGURATION
file.upload-dir=./upload
file.base-url=http://localhost:5001

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT & CORS CONFIGURATION
# 256-bit (32 bytes) Base64 encoded key with support for dynamic environment variable injection in production
jwt.secret-key=${JWT_SECRET_KEY:c2VjdXJpdHktYmFzZS1wcm9qZWN0LXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLXByb2R1Y3Rpb24tZ3JhZGU=}

# https://frontend.prmm.com,https://backend.prm.com
cors.allowed-origins=*

# LOGGING CONFIGURATION
logging.file.name=project-base.log
logging.level.root=info
logging.level.prm.projectbase=debug